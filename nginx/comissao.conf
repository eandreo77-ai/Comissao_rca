# =============================================================================
# /etc/nginx/sites-available/comissao.conf
# Reverse proxy para o Streamlit do Comissao RCA (porta 8502 do host)
#
# Como instalar:
#   sudo cp nginx/comissao.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/comissao.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Aproveita o server padrão (porta 80) — não conflita com 'default' nem 'suprimentos.conf'
# que estão em sites-enabled, porque é só uma location adicional.
#
# Para apontar de outros computadores: rofe.app/comissao no DNS interno → 192.168.20.164
# (alternativa: editar C:\Windows\System32\drivers\etc\hosts em cada PC)

server {
    listen 80;
    server_name rofe.app comissao.local 192.168.20.164;

    # Limite de upload de planilha
    client_max_body_size 10M;

    # Streamlit precisa de WebSocket pra atualizar o front sem reload
    location /comissao/ {
        proxy_pass http://127.0.0.1:8502/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streamlit pode demorar em uploads grandes
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Buffering desligado para SSE/streaming do Streamlit
        proxy_buffering off;
    }

    # Healthcheck rápido (útil pra debug "tá vivo?")
    location = /comissao/_stcore/health {
        proxy_pass http://127.0.0.1:8502/_stcore/health;
        access_log off;
    }
}
