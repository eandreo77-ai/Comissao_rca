# =============================================================================
# Comissao RCA — orquestração no servidor Ubuntu 192.168.20.164
# Estratégia adaptada à infra existente:
#   - MariaDB: usa o do host (já tem 10.11.14 com 'ouvidoria_db' e 'suprimentos')
#   - Instant Client: usa o do host (/opt/oracle/instantclient_21_21) via volume
#   - Network: host (acessa MariaDB localhost direto, Nginx faz proxy externo)
#   - Porta: 8502 (8501 já é do tirofe-v15/portal_rotinas_sensiveis)
# =============================================================================
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comissao_app
    restart: unless-stopped
    env_file: .env

    # Compartilha rede do host:
    # - acessa MariaDB em 127.0.0.1:3306 (localhost-only, sem mexer no bind)
    # - acessa Oracle em 192.168.0.172:1521 normalmente
    # - Streamlit faz bind em 127.0.0.1:8502 (não é exposto direto na rede; só via Nginx)
    network_mode: host

    volumes:
      # Reusa o Instant Client já instalado no host (read-only)
      - /opt/oracle/instantclient_21_21:/opt/instantclient:ro

    # Logs em json-file com rotação
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
